<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบติดตามการบ้าน ม.4 ห้อง 7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div id="login-page" class="flex flex-col items-center justify-center min-h-screen px-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100 transform transition-all">
            <div class="text-center mb-8">
                <div class="bg-indigo-100 text-indigo-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">7</div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">ระบบเช็คการบ้าน ม.4/7</h1>
                <p class="text-sm text-slate-500 mt-1">กรอกรหัสนักเรียนเพื่อเข้าใช้งานระบบ</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">รหัสนักเรียน</label>
                <input type="password" id="student-id" placeholder="รหัสนักเรียน 6 หลัก" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-center text-xl tracking-widest font-mono">
                <button onclick="handleLogin()" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-xl shadow-lg shadow-indigo-100 transition-all duration-150">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <div id="dashboard-page" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
            <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <span class="bg-indigo-600 text-white text-xs font-bold px-2.5 py-1 rounded-md">ROOM 7</span>
                    <h2 class="font-bold text-lg text-slate-900 hidden sm:block">HOMEWORK TRACKER</h2>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <p id="user-display-name" class="font-medium text-sm text-slate-900"></p>
                        <p id="user-display-role" class="text-xs font-medium text-slate-400 uppercase tracking-wider"></p>
                    </div>
                    <button onclick="handleLogout()" class="text-sm text-rose-600 bg-rose-50 hover:bg-rose-100 font-medium px-3 py-2 rounded-xl transition-all">ออกจากระบบ</button>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-5xl w-full mx-auto p-4 space-y-6">
            
            <section id="management-section" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="border-b border-slate-100 pb-4 mb-4 flex items-center justify-between">
                    <h3 class="font-bold text-slate-900 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                        แผงจัดการการบ้าน (สำหรับหัวหน้า/แอดมิน)
                    </h3>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">ชื่อวิชา</label>
                        <input type="text" id="hw-subject" placeholder="เช่น คณิตศาสตร์เพิ่มเติม" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">รายละเอียดงาน / คำสั่ง</label>
                        <input type="text" id="hw-detail" placeholder="เช่น ทำแบบฝึกหัดหน้า 45 ข้อ 1-5" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">กำหนดส่ง</label>
                        <input type="date" id="hw-deadline" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                    </div>
                </div>
                <div class="mt-4 flex justify-end">
                    <button onclick="createNewHomework()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2.5 px-6 rounded-xl shadow-md transition-all">โพสต์การบ้านใหม่</button>
                </div>
            </section>

            <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100">
                    <h3 class="font-bold text-lg text-slate-900">รายการงานและภาระงานที่ต้องส่ง</h3>
                    <p class="text-xs text-slate-400 mt-0.5">ข้อมูลจะอัปเดตแบบเรียลไทม์</p>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-xs font-semibold uppercase tracking-wider border-b border-slate-100">
                                <th class="py-4 px-6">วิชา</th>
                                <th class="py-4 px-6">รายละเอียดงาน</th>
                                <th class="py-4 px-6">กำหนดส่ง</th>
                                <th class="py-4 px-6 text-center">สถานะของคุณ</th>
                                <th class="py-4 px-6 text-right" id="th-actions">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="homework-table-body" class="divide-y divide-slate-100 text-sm">
                            </tbody>
                    </table>
                </div>
                
                <div id="no-data-alert" class="p-12 text-center text-slate-400 hidden">
                    <p class="text-base font-medium">🎉 ยินดีด้วย ไม่มีงานค้างในขณะนี้!</p>
                </div>
            </section>
        </main>
    </div>

    <script src="users.js"></script>
    <script src="app.js"></script>
</body>
</html>
